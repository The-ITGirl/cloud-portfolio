name: Deploy Portfolio

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync files to S3
        run: aws s3 sync . s3://cloudedbyt.com --delete --exclude ".git/*" --exclude ".github/*"
